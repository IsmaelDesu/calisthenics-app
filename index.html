<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Callisthénie Pro</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0a0a0f; --bg2:#0e0e18; --bg3:#111128;
    --accent:#00E5FF; --text:#e8e8e8; --muted:#666; --dim:#333;
    --font-mono:'Share Tech Mono',monospace; --font-title:'Bebas Neue',cursive;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow:hidden;}
  
  /* LAYOUT */
  #app{display:flex;flex-direction:column;height:100%;height:100dvh;}
  
  /* HEADER */
  #header{
    flex-shrink:0;
    background:var(--bg3);
    border-bottom:2px solid var(--accent);
    padding:env(safe-area-inset-top,12px) 16px 12px;
    padding-top:calc(env(safe-area-inset-top,0px) + 12px);
  }
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .phase-badge{
    font-family:var(--font-title);font-size:28px;letter-spacing:2px;
    color:var(--accent);line-height:1;
  }
  .phase-sub{font-size:11px;color:#aaa;letter-spacing:3px;margin-top:2px;}
  .phase-meta{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:1px;}
  #btn-toggle{
    background:transparent;border:1px solid var(--accent);color:var(--accent);
    padding:7px 12px;font-size:9px;letter-spacing:2px;font-family:var(--font-mono);
    cursor:pointer;flex-shrink:0;transition:all .2s;
  }
  #btn-toggle.active{background:var(--accent);color:#000;font-weight:700;}

  /* PHASE PILLS */
  #phase-bar{
    flex-shrink:0;display:flex;gap:6px;overflow-x:auto;
    padding:10px 16px;background:var(--bg);
    scrollbar-width:none;
  }
  #phase-bar::-webkit-scrollbar{display:none;}
  .phase-pill{
    flex-shrink:0;padding:6px 14px;font-size:9px;letter-spacing:2px;
    font-family:var(--font-mono);font-weight:700;cursor:pointer;
    background:#111;color:var(--muted);border:1px solid #1a1a1a;
    transition:all .2s;
  }
  .phase-pill.active{color:#000;}

  /* SCROLL AREA */
  #content{flex:1;overflow-y:auto;padding:0 0 80px;scrollbar-width:none;}
  #content::-webkit-scrollbar{display:none;}

  /* GOAL BANNER */
  .goal-banner{
    margin:12px 16px;padding:12px 16px;
    background:var(--bg2);border-left:3px solid var(--accent);
    font-size:12px;color:#aaa;line-height:1.6;
  }
  .goal-label{font-weight:700;letter-spacing:1px;}

  /* DAY TABS */
  #day-bar{
    display:flex;gap:5px;overflow-x:auto;padding:0 16px 10px;
    scrollbar-width:none;
  }
  #day-bar::-webkit-scrollbar{display:none;}
  .day-pill{
    flex-shrink:0;padding:7px 14px;font-size:9px;letter-spacing:1px;
    font-family:var(--font-mono);cursor:pointer;background:transparent;
    color:var(--muted);border:1px solid #1a1a1a;transition:all .2s;
  }
  .day-pill.active{color:#fff;background:#1a1a2e;}

  /* DAY TITLE */
  .day-title{padding:0 16px 12px;font-size:12px;font-weight:700;letter-spacing:2px;color:#fff;}
  .day-title-bar{width:36px;height:2px;background:var(--accent);margin-top:6px;}

  /* EXERCISE ROWS */
  .ex-row{
    display:grid;grid-template-columns:22px 1fr 36px 60px;
    gap:0 12px;align-items:center;padding:11px 16px;
  }
  .ex-row:nth-child(even){background:var(--bg2);}
  .ex-row:nth-child(odd){background:var(--bg);}
  .ex-num{font-size:9px;color:var(--dim);font-weight:700;}
  .ex-name{font-size:13px;color:#ddd;font-weight:600;line-height:1.3;}
  .ex-note{font-size:10px;color:#555;margin-top:2px;}
  .ex-sets{font-size:12px;font-weight:700;text-align:center;}
  .ex-reps{font-size:10px;color:#888;text-align:right;line-height:1.3;}
  .ex-row.highlight{border-left:2px solid var(--accent);}

  /* TIPS */
  .tips-section{padding:16px;}
  .tips-label{font-size:9px;color:#333;letter-spacing:3px;margin-bottom:10px;}
  .tip-row{
    display:flex;gap:10px;padding:9px 0;
    border-bottom:1px solid #111;font-size:11px;color:#555;line-height:1.5;
  }
  .tip-arrow{flex-shrink:0;font-weight:700;}

  /* PROGRESSION TABLE */
  #progression{padding:0 0 20px;}
  .prog-table{width:100%;border-collapse:collapse;font-size:10px;}
  .prog-table th{
    padding:8px 8px;border-bottom:1px solid #1a1a1a;
    color:var(--muted);font-size:8px;letter-spacing:2px;text-align:center;
  }
  .prog-table th:first-child{text-align:left;padding-left:16px;}
  .prog-table td{padding:9px 8px;border-bottom:1px solid #0e0e0e;text-align:center;}
  .prog-table td:first-child{text-align:left;padding-left:16px;color:#ccc;font-weight:700;font-size:11px;}
  .prog-table td.active-col{font-weight:700;}

  /* BOTTOM NAV */
  #bottom-nav{
    flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
    padding:10px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px);
    background:var(--bg3);border-top:1px solid #1a1a1a;
    position:sticky;bottom:0;
  }
  .nav-btn{
    padding:9px 20px;font-size:9px;letter-spacing:2px;
    font-family:var(--font-mono);font-weight:700;cursor:pointer;
  }
  .nav-btn.prev{background:transparent;border:1px solid #222;color:#555;}
  .nav-btn.next{border:none;color:#000;}
  .nav-btn:disabled{opacity:.3;cursor:default;}
  .nav-info{text-align:center;font-size:9px;color:#333;letter-spacing:1px;line-height:1.5;}

  /* INSTALL BANNER */
  #install-banner{
    display:none;position:fixed;bottom:70px;left:16px;right:16px;
    background:#111;border:1px solid var(--accent);padding:14px 16px;
    z-index:200;
  }
  #install-banner p{font-size:11px;color:#aaa;margin-bottom:10px;line-height:1.5;}
  #install-banner .row{display:flex;gap:8px;}
  #btn-install{
    flex:1;padding:10px;background:var(--accent);color:#000;
    border:none;font-family:var(--font-mono);font-size:10px;
    letter-spacing:2px;font-weight:700;cursor:pointer;
  }
  #btn-dismiss{
    padding:10px 14px;background:transparent;color:var(--muted);
    border:1px solid #333;font-family:var(--font-mono);font-size:9px;cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="phase-badge" id="h-label">PHASE 1</div>
        <div class="phase-sub" id="h-sub">FONDATIONS</div>
        <div class="phase-meta" id="h-meta">Semaines 1–4 · 3×/semaine</div>
      </div>
      <button id="btn-toggle" onclick="toggleView()">PROGRESSIONS →</button>
    </div>
  </div>

  <div id="phase-bar"></div>

  <div id="content">
    <div id="workout-view"></div>
    <div id="progression" style="display:none"></div>
  </div>

  <div id="bottom-nav">
    <button class="nav-btn prev" id="btn-prev" onclick="navigate(-1)">← PRÉC.</button>
    <div class="nav-info" id="nav-info"></div>
    <button class="nav-btn next" id="btn-next" onclick="navigate(1)">SUIV. →</button>
  </div>
</div>

<div id="install-banner">
  <p>📲 <strong style="color:#fff">Installer l'app</strong> sur ton Pixel pour un accès hors-ligne !</p>
  <div class="row">
    <button id="btn-install" onclick="installApp()">INSTALLER</button>
    <button id="btn-dismiss" onclick="dismissBanner()">Plus tard</button>
  </div>
</div>

        {n:"Deep squat mobility",s:"—",r:"10 min",note:""},
        {n:"Épaules & poignets",s:"—",r:"15 min",note:"Prévention clé"},
      ]},
    ],
    tips:[
      "À ce stade, individualise selon tes faiblesses spécifiques.",
      "Compétition possible : Street Workout, Calisthenics World…",
      "La planche full peut prendre 1–3 ans selon la morphologie (bras longs = plus dur).",
    ]
  },
];

const PROGRESSIONS = [
  {skill:"Tractions", cols:["Négatives 5s","Lestées +10kg","One Arm assist","One Arm strict","OAP complet"]},
  {skill:"Dips", cols:["BW strict","Lestés +10kg","Ring Dip","Ring Muscle-up","Dips +40kg"]},
  {skill:"Pompes", cols:["Archer","Ring Push-up","1 bras assist","One Arm","Planche Push-up"]},
  {skill:"Handstand", cols:["Mur face","Libre 10s","Libre 30s","HS Walk","Press HS"]},
  {skill:"Front Lever", cols:["—","Tuck 10s","Straddle 8s","Full 8s","FL Pull strict"]},
  {skill:"Planche", cols:["—","—","Tuck 10s","Straddle 8s","Full Planche"]},
  {skill:"Gainage", cols:["Hollow 20s","Ab Wheel","L-sit 15s","Dragon Flag","Manna"]},
];

let state = { phase: 0, day: 0, showProg: false };

function getPhase(){ return PHASES[state.phase]; }
function getColor(){ return getPhase().color; }

function render(){
  const p = getPhase();
  document.documentElement.style.setProperty('--accent', p.color);
  
  // Header
  document.getElementById('h-label').textContent = p.label;
  document.getElementById('h-sub').textContent = p.sub;
  document.getElementById('h-meta').textContent = `${p.duration} · ${p.freq}`;
  
  const btn = document.getElementById('btn-toggle');
  btn.textContent = state.showProg ? '← SÉANCES' : 'PROGRESSIONS →';
  btn.className = state.showProg ? 'active' : '';

  // Phase bar
  const pb = document.getElementById('phase-bar');
  pb.innerHTML = '';
  PHASES.forEach((ph, i) => {
    const b = document.createElement('button');
    b.className = 'phase-pill' + (i===state.phase?' active':'');
    b.textContent = ph.label;
    if(i===state.phase) b.style.background = ph.color;
    b.onclick = () => { state.phase=i; state.day=0; render(); };
    pb.appendChild(b);
  });

  // Content
  document.getElementById('workout-view').style.display = state.showProg?'none':'block';
  document.getElementById('progression').style.display = state.showProg?'block':'none';

  if(state.showProg){
    renderProg();
  } else {
    renderWorkout();
  }

  // Nav
  const totalDays = p.days.length;
  document.getElementById('nav-info').innerHTML = `${p.label}<br>JOUR ${String.fromCharCode(65+state.day)}`;
  
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  btnNext.style.background = p.color;
  
  btnPrev.disabled = state.phase===0 && state.day===0;
  btnNext.disabled = state.phase===PHASES.length-1 && state.day===p.days.length-1;
}

function renderWorkout(){
  const p = getPhase();
  const day = p.days[state.day];
  let html = `
    <div class="goal-banner">
      <span class="goal-label" style="color:${p.color}">OBJECTIF : </span>${p.goal}
    </div>
    <div id="day-bar">
  `;
  p.days.forEach((d,i) => {
    html += `<button class="day-pill${i===state.day?' active':''}" onclick="setDay(${i})">JOUR ${String.fromCharCode(65+i)}</button>`;
  });
  html += `</div>
    <div class="day-title">${day.name}<div class="day-title-bar" style="background:${p.color}"></div></div>
  `;
  day.exercises.forEach((ex, i) => {
    html += `
      <div class="ex-row${ex.hl?' highlight':''}">
        <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
        <div>
          <div class="ex-name">${ex.n}</div>
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
        </div>
        <div class="ex-sets" style="color:${p.color}">${ex.s}×</div>
        <div class="ex-reps">${ex.r}</div>
      </div>`;
  });
  html += `<div class="tips-section"><div class="tips-label">NOTES DE PHASE</div>`;
  p.tips.forEach(t => {
    html += `<div class="tip-row"><span class="tip-arrow" style="color:${p.color}">→</span><span>${t}</span></div>`;
  });
  html += '</div>';
  document.getElementById('workout-view').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function renderProg(){
  const p = getPhase();
  let html = '<table class="prog-table"><thead><tr><th>SKILL</th>';
  PHASES.forEach((ph,i) => {
    html += `<th style="color:${ph.color}">${ph.label.replace('PHASE ','P')}</th>`;
  });
  html += '</tr></thead><tbody>';
  PROGRESSIONS.forEach(row => {
    html += '<tr><td>'+row.skill+'</td>';
    row.cols.forEach((v,j) => {
      const active = j===state.phase;
      html += `<td class="${active?'active-col':''}" style="${active?'color:'+p.color+';background:rgba(255,255,255,0.03)':'color:#444'}">${v}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('progression').innerHTML = html;
}

function toggleView(){
  state.showProg = !state.showProg;
  render();
}

function setDay(i){
  state.day = i;
  render();
}

function navigate(dir){
  const p = getPhase();
  if(dir === 1){
    if(state.day < p.days.length-1) state.day++;
    else if(state.phase < PHASES.length-1){ state.phase++; state.day=0; }
  } else {
    if(state.day > 0) state.day--;
    else if(state.phase > 0){ state.phase--; state.day=PHASES[state.phase].days.length-1; }
  }
  render();
}

// PWA Install
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => { document.getElementById('install-banner').style.display='block'; }, 2000);
});
function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display='none';
  });
}
function dismissBanner(){
  document.getElementById('install-banner').style.display='none';
}

// Service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

render();
</script>
</body>
</html>
